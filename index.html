<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English to Pinyin Dictionary</title>
  <!-- TinyPinyin CDN: converts Chinese characters to pinyin in the browser -->
  <script src="https://unpkg.com/tiny-pinyin/dist/tiny-pinyin.min.js"></script>
  <style>
    /* ----------  Global & Layout  ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 40px 20px 20px;
    }
    .container {
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      width: 100%; max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1),0 20px 60px rgba(0,0,0,.05);
      border: 1px solid rgba(255,255,255,.2);
    }
    h1 { font-size: 2rem; font-weight: 700; color: #1d1d1f; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color:#6e6e73; font-size:1rem; margin-bottom:32px; }

    /* ----------  Search  ---------- */
    .search-container{position:relative;margin-bottom:24px}
    input{width:100%;padding:16px 20px;font-size:1.1rem;border:2px solid #f0f0f0;border-radius:16px;background:#f9f9f9;transition:.3s;outline:none}
    input:focus{border-color:#007aff;background:#fff;box-shadow:0 0 0 4px rgba(0,122,255,.1)}
    input:disabled{background:#f0f0f0;color:#999;cursor:not-allowed}
    .search-suggestions{position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);margin-top:4px;max-height:200px;overflow-y:auto;z-index:1000;display:none}
    .suggestion-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:.2s}
    .suggestion-item:hover{background:#f8f8f8}
    .suggestion-item:last-child{border-bottom:none}
    .suggestion-word{font-weight:600;color:#007aff}
    .suggestion-translation{font-size:.9rem;color:#666;margin-top:2px}

    /* ----------  Tabs  ---------- */
    .tabs{display:flex;background:#f0f0f0;border-radius:12px;margin-bottom:24px;padding:4px}
    .tab{flex:1;padding:12px;text-align:center;border-radius:8px;cursor:pointer;transition:.3s;font-weight:500}
    .tab.active{background:#fff;color:#007aff;box-shadow:0 2px 8px rgba(0,0,0,.1)}

    /* ----------  Buttons  ---------- */
    button{width:100%;padding:16px;background:#007aff;color:#fff;border:none;border-radius:16px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:.3s;margin-top:12px}
    button:hover{background:#0056cc;transform:translateY(-1px)}
    button:active{transform:translateY(0)}

    /* ----------  Result Card  ---------- */
    .result{background:#fff;border-radius:20px;padding:24px;margin-top:24px;border:1px solid #f0f0f0;opacity:0;transform:translateY(20px);transition:.5s}
    .result.show{opacity:1;transform:translateY(0)}
    .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .favorite-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:8px;border-radius:50%;transition:.3s;width:auto;margin:0}
    .favorite-btn:hover{background:#f0f0f0;transform:scale(1.1)}
    .label{font-weight:600;color:#666;min-width:60px;font-size:.9rem}
    .hanzi{font-size:1.8rem;color:#1d1d1f;font-weight:500}
    .pinyin{font-size:1.3rem;color:#007aff;font-weight:500}
    .defs{font-size:1.1rem;color:#333}
    .error{text-align:center;color:#ff3b30;font-size:1.1rem}
    .speaker-btn{background:#f0f0f0;border:none;border-radius:12px;width:40px;height:40px;margin-left:12px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center}
    .speaker-btn:hover{background:#e0e0e0}

    /* ----------  Tags & Lists  ---------- */
    .word-list{margin-top:32px;padding-top:24px;border-top:1px solid #f0f0f0}
    .word-list h3{text-align:center;font-size:1.1rem;color:#666;margin-bottom:12px}
    .word-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .word-tag{background:#f0f8ff;color:#007aff;padding:6px 12px;border-radius:20px;font-size:.9rem;cursor:pointer;transition:.3s;border:1px solid rgba(0,122,255,.2);position:relative}
    .word-tag:hover{background:#007aff;color:#fff}
    .word-tag.favorited::after{content:'❤️';position:absolute;top:-8px;right:-8px;font-size:.7rem}
    .favorites-list{margin-top:20px}
    .no-favorites{text-align:center;color:#999;font-style:italic}

    /* ----------  Online Search  ---------- */
    .online-search{margin-top:16px;padding:12px;background:#f8f8ff;border:1px dashed #007aff;border-radius:12px;text-align:center}
    .online-search button{margin-top:8px;padding:10px;font-size:.9rem}
    .loading{display:inline-block;width:20px;height:20px;border:3px solid rgba(0,122,255,.3);border-radius:50%;border-top-color:#007aff;animation:spin 1s ease-in-out infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ----------  Responsive  ---------- */
    @media(max-width:480px){.container{margin:20px;padding:24px}h1{font-size:1.5rem}}
  </style>
</head>
<body>
  <div class="container">
    <h1>English → 拼音</h1>
    <p class="subtitle">English to Chinese Pinyin Dictionary</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('search')">Search</div>
      <div class="tab" onclick="switchTab('favorites')">Favorites</div>
    </div>

    <div id="searchTab">
      <div class="search-container">
        <input id="query" type="text" placeholder="Enter English word (fuzzy search supported)" oninput="showSuggestions()" />
        <div id="suggestions" class="search-suggestions"></div>
        <button onclick="search()">Search</button>
      </div>

      <div id="result" class="result"></div>

      <div class="word-list">
        <h3>Available Words</h3>
        <div class="word-tags" id="wordTags"></div>
      </div>
    </div>

    <div id="favoritesTab" style="display:none;">
      <div class="favorites-list">
        <h3>Your Favorite Words</h3>
        <div id="favoritesList"></div>
      </div>
    </div>
  </div>

  <script>
    /* ------------------------------  Variables  ----------------------------- */
    let dict = {};
    let currentWord = '';
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    /* -------------------------  Dictionary Loading  ------------------------- */
    async function loadDictionary() {
      try {
        const response = await fetch('dict.json');
        if (!response.ok) throw new Error('Failed to load dictionary');
        dict = await response.json();
      } catch (err) {
        console.error('Error loading dictionary:', err);
        // fallback minimal dictionary
        dict = {
          "hello": { hanzi: "你好", pinyin: "nǐ hǎo", defs: ["hello","hi"] },
          "thank": { hanzi: "谢谢", pinyin: "xiè xie", defs: ["thank you","thanks"] },
          "love": { hanzi: "爱", pinyin: "ài", defs: ["love"] }
        };
      } finally {
        updateWordTags();
        const q = document.getElementById('query');
        q.disabled = false;
        q.placeholder = 'Enter English word (fuzzy search supported)';
      }
    }

    /* ------------------------------  UI Helpers ----------------------------- */
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (tab === 'search') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('searchTab').style.display = 'block';
        document.getElementById('favoritesTab').style.display = 'none';
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('searchTab').style.display = 'none';
        document.getElementById('favoritesTab').style.display = 'block';
        loadFavorites();
      }
    }

    /* ---------------------------  Fuzzy Search  ----------------------------- */
    function fuzzySearch(q) {
      if (!q) return [];
      q = q.toLowerCase();
      const out = [];
      for (const [w,data] of Object.entries(dict)) {
        let s = 0;
        if (w===q) s=100; else if (w.startsWith(q)) s=80; else if (w.includes(q)) s=60; else if (data.defs.some(d=>d.toLowerCase().includes(q))) s=40; else {
          let mc=0, last=-1; for (const c of q){const idx=w.indexOf(c,last+1); if(idx!=-1){mc++; last=idx;}} if(mc>0) s=(mc/q.length)*30;
        }
        if (s>0) out.push({word:w,data,score:s});
      }
      return out.sort((a,b)=>b.score-a.score).slice(0,5);
    }

    function showSuggestions() {
      const q=document.getElementById('query').value.trim();
      const sBox=document.getElementById('suggestions');
      if (q.length<1){sBox.style.display='none'; return;}
      const res=fuzzySearch(q);
      if(res.length>0){
        sBox.innerHTML=res.map(r=>`<div class="suggestion-item" onclick="selectSuggestion('${r.word}')"><div class="suggestion-word">${r.word}</div><div class="suggestion-translation">${r.data.hanzi} (${r.data.pinyin})</div></div>`).join('');
        sBox.style.display='block';
      } else sBox.style.display='none';
    }

    function selectSuggestion(word){document.getElementById('query').value=word; document.getElementById('suggestions').style.display='none'; displayResult(word);}    
    function search(){const w=document.getElementById('query').value.trim().toLowerCase(); if(w){displayResult(w); document.getElementById('suggestions').style.display='none';}}
    function searchWord(w){document.getElementById('query').value=w; displayResult(w);}

    /* -------------------  Online Translation: LibreTranslate  ------------------ */
    async function translateOnline(word){
      const result=document.getElementById('result');
      result.innerHTML=`<div style="text-align:center;padding:20px;"><div class="loading"></div><p>Translating "${word}" using LibreTranslate...</p></div>`;
      try{
        const res=await fetch('https://libretranslate.com/translate',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({q:word, source:'en', target:'zh', format:'text'})
        });
        if(!res.ok) throw new Error('LibreTranslate unavailable');
        const data=await res.json();
        const translation=data.translatedText;
        if(!translation) throw new Error('No translation returned');

        // Convert to pinyin using TinyPinyin
        let pinyinText='auto';
        if (window.Pinyin && Pinyin.isSupported()) {
          pinyinText=Pinyin.convertToPinyin(translation,' ',true);
        }

        const newEntry={hanzi:translation,pinyin:pinyinText,defs:[word]};
        dict[word]=newEntry;
        // persist custom dict
        try{
          const cDict=JSON.parse(localStorage.getItem('customDict')||'{}');
          cDict[word]=newEntry; localStorage.setItem('customDict',JSON.stringify(cDict));
        }catch(e){console.error('Save custom dict failed',e);}
        updateWordTags();
        displayResult(word);
      }catch(err){
        console.error('Translate error',err);
        result.innerHTML=`<p class="error">Online translation failed: ${err.message}</p><p style="text-align:center;margin-top:12px;">Please try again later.</p>`;
      }
    }

    /* ----------------------------  Display Logic ---------------------------- */
    function displayResult(word){
      const entry=dict[word];
      const box=document.getElementById('result');
      currentWord=word;
      if(entry){
        const fav=favorites.includes(word);
        box.innerHTML=`<div class="result-header"><h2 style="margin:0;color:#1d1d1f;">${word}</h2><button class="favorite-btn" onclick="toggleFavorite()" title="${fav?'Remove':'Add'} from favorites">${fav?'❤️':'🤍'}</button></div><div class="result-item"><span class="label">汉字:</span><span class="hanzi">${entry.hanzi}</span><button class="speaker-btn" onclick="speak('${entry.hanzi}...
